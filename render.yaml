services:
  - type: web
    name: airquality-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: airquality-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_HOST
        value: 0.0.0.0

databases:
  - name: airquality-db
    databaseName: airquality
    user: airquality
    plan: free
